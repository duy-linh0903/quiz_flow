<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password - QuizFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <header class="header-container">
        <div class="logo-group"><a href="/" class="logo">QuizFlow</a></div>
        <div class="top-nav-group">
            <nav class="nav-menu" aria-label="Main">
                <ul class="header-nav-menu">
                    <li><a href="/help" class="header-nav-links header-nav-links-help">Help</a></li>
                    <li><a href="/resources" class="header-nav-links header-nav-links-resources">Resources</a></li>
                </ul>
            </nav>
            <div class="profile-group">
                <i class="fa-regular fa-user"></i>
                <a href="" class="profile">Profile</a>
            </div>
        </div>
    </header>
    <main class="reset-password-page">
        <div class="reset-password-card">
            <div class="reset-password-hero-icon">
                <i class="fa-solid fa-arrow-rotate-left"></i>
            </div>
            <div class="reset-password-hero">
                <h1 class="reset-password-heading">Reset your password</h1>
                <p>Please choose a new, secure password for your account.</p>
            </div>
            <form action="" method="POST" class="reset-password-form">
                <div class="field">
                    <label for="password">New Password</label>
                    <input type="password" id="password" name="password" required />
                </div>
                <div class="field password-strength-wrapper">
                    <p class="strength-label">
                        PASSWORD STRENGTH
                        <span class="strength-status">FAIR</span>
                    </p>
                    <div class="strength-bar strength-2">
                        <div class="strength-chunk"></div>
                        <div class="strength-chunk"></div>
                        <div class="strength-chunk"></div>
                    </div>
                    <div class="password-requirements">
                        <div class="requirement-item">
                            <input type="checkbox" name="number-characters" id="number-characters" checked>
                            <label for="number-characters">At least 8 characters</label>
                        </div>
                        <div class="requirement-item">
                            <input type="checkbox" name="contain-symbols" id="contain-symbols">
                            <label for="contain-symbols">Contains a number or symbol</label>
                        </div>
                        <div class="requirement-item">
                            <input type="checkbox" name="mix-up-low" id="mix-up-low">
                            <label for="mix-up-low">Mix of uppercase and lowercase</label>
                        </div>
                    </div>
                </div>
                <div class="field">
                    <label for="confirmPassword">Confirm New Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required />
                </div>
                <button type="submit" class="btn-submit">Update Password</button>
            </form>
            <div class="reset-password-line"></div>
            <a href="" class="back-to-login">
                <i class="fa-solid fa-arrow-left"></i>
                Back to login
            </a>
        </div>
    </main>
    <footer>
        <div class="container">
            <p class="copy-right">&copy; 2026 QuizFlow Academic Systems. All rights reserved.</p>
            <ul class="footer-nav">
                <li><a href="#privacy">Privacy Policy</a></li>
                <li><a href="#about">Terms of Service</a></li>
                <li><a href="#contact">Accessibility</a></li>
            </ul>
        </div>
    </footer>
</body>

</html>
