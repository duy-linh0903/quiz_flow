<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password - QuizFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <header class="header-container">
        <div class="logo-group"><a href="/" class="logo">QuizFlow</a></div>
        <div class="top-nav-group">
            <nav class="nav-menu" aria-label="Main">
                <ul class="header-nav-menu">
                    <li><a href="/help" class="header-nav-links header-nav-links-help">Help</a></li>
                    <li><a href="/resources" class="header-nav-links header-nav-links-resources">Resources</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="forgot-password-page">
        <div class="forgot-password-card">
            <div class="forgot-password-hero-icon">
               <i class="fa-solid fa-circle-question"></i>
            </div>
            <div class="forgot-password-hero">
                <h1 class="forgot-password-heading">Forgot your password</h1>
                <p>Enter your email address and we'll send a link to reset your password</p>
            </div>
            <form action="" method="POST" class="reset-password-form">
                <div class="field">
                    <label for="email">Email Address</label>
                    <input type="email" name="email" id="email" placeholder="name@institution.edu" required>
                </div>
                <button type="submit" class="btn-submit">
                    Send Request Link
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>
            <div class="forgot-password-line"></div>
            <a href="" class="back-to-login">
                <i class="fa-solid fa-arrow-left"></i>
                Back to login
            </a>
        </div>
    </main>
    <footer>
        <div class="container">
            <p class="copy-right">&copy; 2026 QuizFlow Academic Systems. All rights reserved.</p>
            <ul class="footer-nav">
                <li><a href="#privacy">Privacy Policy</a></li>
                <li><a href="#about">Terms of Service</a></li>
                <li><a href="#contact">Accessibility</a></li>
            </ul>
        </div>
    </footer>
</body>

</html>
